<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maksim | Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAV -->
  <nav>
    <h1>Maksim</h1>
    <div class="links">
      <a href="#projects">Projects</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h2 id="typing"></h2>
    <p>Builder • Python • AI • Web</p>
    <button onclick="scrollToSection('projects')">Explore</button>
  </section>

  <!-- PROJECTS -->
  <section id="projects">
    <h2>Projects</h2>

    <div class="grid">

      <!-- PROJECT 1 -->
      <div class="card">
        <h3>Mini Paint App</h3>
        <canvas id="paintCanvas"></canvas>
        <button onclick="clearCanvas()">Clear</button>
      </div>

      <!-- PROJECT 2 -->
      <div class="card">
        <h3>Counter Game</h3>
        <p id="counter">0</p>
        <button onclick="increment()">Click Me</button>
      </div>

      <!-- PROJECT 3 -->
      <div class="card">
        <h3>Live Clock</h3>
        <p id="clock"></p>
      </div>

    </div>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <h2>About</h2>
    <p>
      I build real projects using Python, AI, and web tech.  
      I like making things that are interactive, fast, and actually useful.
    </p>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Connect</h2>
    <div class="socials">
      <a href="https://github.com/YOUR_USERNAME" target="_blank">GitHub</a>
      <a href="https://www.tiktok.com/@YOUR_USERNAME" target="_blank">TikTok</a>
      <a href="https://instagram.com/YOUR_USERNAME" target="_blank">Instagram</a>
    </div>
  </section>

  <footer>
    © 2026 Maksim
  </footer>

  <canvas id="bg"></canvas>

  <script>
    // Smooth scroll
    function scrollToSection(id) {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
    }

    // Typing effect
    const text = "Maksim Nikolov";
    let i = 0;
    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 80);
      }
    }
    type();

    // Counter
    let count = 0;
    function increment() {
      count++;
      document.getElementById("counter").innerText = count;
    }

    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Paint app
    const canvas = document.getElementById("paintCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 250;
    canvas.height = 150;

    let drawing = false;

    canvas.addEventListener("mousedown", () => drawing = true);
    canvas.addEventListener("mouseup", () => drawing = false);
    canvas.addEventListener("mousemove", draw);

    function draw(e) {
      if (!drawing) return;
      ctx.fillRect(e.offsetX, e.offsetY, 4, 4);
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Subtle particle background
    const bg = document.getElementById("bg");
    const bctx = bg.getContext("2d");

    function resize() {
      bg.width = window.innerWidth;
      bg.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    let particles = Array.from({ length: 60 }, () => ({
      x: Math.random() * bg.width,
      y: Math.random() * bg.height,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5
    }));

    function animate() {
      bctx.clearRect(0, 0, bg.width, bg.height);

      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > bg.width) p.vx *= -1;
        if (p.y < 0 || p.y > bg.height) p.vy *= -1;

        bctx.fillRect(p.x, p.y, 2, 2);
      });

      requestAnimationFrame(animate);
    }
    animate();
  </script>

</body>
</html>
